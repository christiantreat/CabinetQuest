<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(45deg, #0B1026, #162042, #1D2E5F, #24375C);
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            animation: twinkle var(--twinkle-duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }

        .grass-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            overflow: hidden;
            z-index: 1;
        }

        .star {
            z-index: 0;
        }

        .grass {
            --grass-height: 100px;
            position: absolute;
            bottom: 0;
            width: 2px;
            transform-origin: bottom center;
            background: linear-gradient(to top, 
                #0A1612,
                #122419 20%,
                #1A3024 40%,
                #234432 60%,
                #2D503F 80%,
                #366851 90%,
                #407A5E 95%
            );
        }

        .grass::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to left,
                transparent 0%,
                rgba(64, 122, 94, 0.3) 50%,
                transparent 100%
            );
            animation: shimmer var(--shimmer-duration) infinite alternate;
        }

        @keyframes shimmer {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes sway {
            0%, 100% {
                transform: rotate(var(--start-angle));
            }
            50% {
                transform: rotate(var(--end-angle));
            }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            animation: shoot 4s linear infinite;
        }

        @keyframes shoot {
            0% {
                transform: translateX(-100%) translateY(-100%);
            }
            100% {
                transform: translateX(200%) translateY(200%);
            }
        }
    </style>
</head>
<body>
    <div class="grass-container" id="grassContainer"></div>
    <script>
        // Create stars
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            
            const colors = ['#FFFFFF', '#E3EBF5', '#C5D9ED', '#A7C7E7', '#88B5E1', '#69A3DB', '#4B91D5'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const x = Math.random() * 100;
            const y = Math.random() * 95; // Allow stars across full height
            
            const size = Math.random() * 3 + 1;
            const twinkleDuration = (Math.random() * 3 + 2) + 's';
            
            star.style.cssText = `
                left: ${x}%;
                top: ${y}%;
                width: ${size}px;
                height: ${size}px;
                background-color: ${color};
                --twinkle-duration: ${twinkleDuration};
                box-shadow: 0 0 ${size * 2}px ${color};
            `;
            
            document.body.appendChild(star);
        }

        // Create grass blades
        function createGrass() {
            const container = document.getElementById('grassContainer');
            const numberOfBlades = Math.floor(window.innerWidth / 0.2); // Space blades 1.5px apart for extra density

            for (let i = 0; i < numberOfBlades; i++) {
                const blade = document.createElement('div');
                blade.className = 'grass';
                
                // Randomize grass properties
                const height = 40 + Math.random() * 80; // Height between 80-120px
                const left = (i * 1.5) + Math.random() * 1 - 0.5; // Tighter spacing with subtle randomness
                const startAngle = -10 + Math.random() * 5; // Start angle between -10 and -5 degrees
                const swayAmount = 5 + Math.random() * 8; // Sway amount between 5-15 degrees
                const endAngle = startAngle + swayAmount;
                const animationDuration = 7 + Math.random() * 3; // Duration between 2-5s
                const animationDelay = Math.random() * -5; // Random start time
                const shimmerDuration = 1 + Math.random() * 2; // Shimmer effect duration
                
                blade.style.cssText = `
                    height: ${height}px;
                    left: ${left}px;
                    --start-angle: ${startAngle}deg;
                    --end-angle: ${endAngle}deg;
                    --shimmer-duration: ${shimmerDuration}s;
                    animation: sway ${animationDuration}s ease-in-out infinite;
                    animation-delay: ${animationDelay}s;
                `;
                
                container.appendChild(blade);
            }
        }

        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            
            const x = Math.random() * 100;
            star.style.left = x + '%';
            star.style.top = '0';
            
            document.body.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, 4000);
        }

        // Initialize scene and handle fullscreen
        function initScene() {
            for (let i = 0; i < 150; i++) {
                createStar();
            }
            createGrass();

            // Request fullscreen on page load
            document.addEventListener('click', () => {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                    document.documentElement.msRequestFullscreen();
                }
            });
        }

        // Prevent default touch behaviors
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Create shooting stars periodically
        setInterval(() => {
            if (Math.random() < 0.3) {
                createShootingStar();
            }
        }, 2000);

        // Recreate grass on window resize or orientation change
        window.addEventListener('resize', () => {
            const container = document.getElementById('grassContainer');
            container.innerHTML = '';
            createGrass();
        });

        window.addEventListener('orientationchange', () => {
            const container = document.getElementById('grassContainer');
            container.innerHTML = '';
            createGrass();
        });

        // Initialize the scene
        initScene();
    </script>
</body>
</html>
